<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>本机公网IP</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            overflow-x: hidden;
        }
        body {
            font-family: system-ui, sans-serif;
            padding: 10px;
            background-color: #f5f5f5;
        }
        .box {
            background-color: #ffffff;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 10px;
            padding: 12px 10px;
        }
        .item {
            display: flex;
            align-items: center;
            flex-wrap: nowrap;
            gap: 15px;
            /* 自适应字号，完整容纳文字，最小12px最大18px */
            font-size: clamp(12px, calc((100% - 20px)/76), 18px);
        }
        label {
            flex-shrink: 0;
            white-space: nowrap;
            font-weight: bold;
        }
        .ip-group {
            display: flex;
            gap: 5px;
            min-width: 0;
            flex: 1;
        }
        span {
            white-space: nowrap;
            /* 关闭省略号，完整显示 */
            text-overflow: unset;
            overflow: visible;
        }
        .qrcode-wrap {
            margin-top: 20px;
            text-align: center;
        }
        canvas {
            max-width: 80%;
            border-radius: 6px;
            background: #fff;
            padding: 8px;
        }
        .nat-item {
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="box" id="mainBox">
        <div class="item">
            <label id="mainLabel">pod</label>
            <div class="ip-group">
                <span id="main4">加载中...</span>
                <span id="main6">加载中...</span>
            </div>
        </div>
        <div class="item nat-item">
            <label>NAT</label>
            <span id="natType">检测中...</span>
        </div>
    </div>
    <div class="box" id="dentBox">
        <div class="item">
            <label>dent</label>
            <div class="ip-group">
                <span id="dent4">加载中...</span>
                <span id="dent6">加载中...</span>
            </div>
        </div>
    </div>
    <div class="qrcode-wrap" id="qrBox"></div>

    <script>
        async function fetchIp(url, timeout = 2000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeout);
            try {
                const res = await fetch(url, {
                    mode: 'cors',
                    signal: controller.signal
                });
                clearTimeout(timer);
                if (!res.ok) throw new Error('接口异常');
                const ip = (await res.text()).trim();
                return ip || null;
            } catch (err) {
                clearTimeout(timer);
                return null;
            }
        }

        function stunSingleTest(stunUrl, timeoutMs = 2000) {
            return new Promise(resolve => {
                const pc = new RTCPeerConnection({ iceServers: [{ urls: stunUrl }] });
                pc.createDataChannel('nat-test');
                let result = null;
                let done = false;
                const timer = setTimeout(() => {
                    pc.close();
                    done = true;
                    resolve(null);
                }, timeoutMs);

                pc.onicecandidate = evt => {
                    if (!evt.candidate || done) return;
                    const candStr = evt.candidate.candidate;
                    if (!candStr) return;
                    const arr = candStr.split(' ');
                    const candType = arr[7];
                    if (candType === 'srflx') {
                        result = { ip: arr[4], port: Number(arr[5]) };
                    }
                };

                pc.createOffer().then(sdp => pc.setLocalDescription(sdp));
                pc.onicegatheringstatechange = () => {
                    if (pc.iceGatheringState === 'complete' && !done) {
                        clearTimeout(timer);
                        pc.close();
                        done = true;
                        resolve(result);
                    }
                };
            })
        }

        function getLocalIp() {
            return new Promise(resolve => {
                const pc = new RTCPeerConnection();
                pc.createDataChannel('local');
                let localIp = '';
                pc.onicecandidate = evt => {
                    if (!evt.candidate) return;
                    const arr = evt.candidate.candidate.split(' ');
                    if (arr[7] === 'host') localIp = arr[4];
                }
                pc.createOffer().then(s => pc.setLocalDescription(s));
                pc.onicegatheringstatechange = () => {
                    pc.close();
                    resolve(localIp);
                }
            })
        }

        const STUN_LIST = [
            "stun:stun.miwifi.com:3478",
            "stun:stun.bilibili.com:3478",
            "stun:stun.douyu.com:3478",
            "stun:stun.l.google.com:19302"
        ];

        async function checkNatTypeFull() {
            const localIp = await getLocalIp();
            const testResults = [];
            for (const stun of STUN_LIST) {
                const res = await stunSingleTest(stun);
                testResults.push(res);
            }
            const validResults = testResults.filter(item => item !== null);
            if (validResults.length === 0) return "UDP被防火墙拦截，无公网映射";
            const first = validResults[0];
            if (localIp === first.ip) return "NAT1 全锥型公网IP";
            const portSet = new Set(validResults.map(i => i.port));
            if (portSet.size === 1) return "NAT2 受限锥形NAT";
            const ipSet = new Set(validResults.map(i => i.ip));
            if (ipSet.size === 1) {
                return "NAT3 端口受限锥形CGNAT";
            } else {
                return "NAT4 对称NAT（严格CGN）";
            }
        }

        function renderIp(labelDom, dom4Id, dom6Id, ipData) {
            const dom4 = document.getElementById(dom4Id);
            const dom6 = document.getElementById(dom6Id);
            dom4.innerText = ipData.ipv4 ?? '无IPv4';
            dom6.innerText = ipData.ipv6 ?? '无IPv6';
            if (ipData.ipv6) {
                generateQr(`http://[${ipData.ipv6}]:8088`);
            }
        }

        function generateQr(content) {
            const qrBox = document.getElementById('qrBox');
            qrBox.innerHTML = '';
            const canvas = document.createElement('canvas');
            qrBox.appendChild(canvas);
            QRCode.toCanvas(canvas, content, { width: 300 });
        }

        (async () => {
            let pod4 = await fetchIp('https://ipv4.ddnspod.com');
            let pod6 = await fetchIp('https://ipv6.ddnspod.com');
            const mainLabel = document.getElementById('mainLabel');
            const dentBox = document.getElementById('dentBox');
            const natDom = document.getElementById('natType');
            const natResult = await checkNatTypeFull();
            natDom.innerText = natResult;

            if (pod4 && pod6) {
                dentBox.style.display = 'none';
                renderIp(mainLabel, 'main4', 'main6', { ipv4: pod4, ipv6: pod6 });
                return;
            }

            mainLabel.innerText = 'dent';
            dentBox.style.display = 'none';
            let dent4 = await fetchIp('https://4.ident.me');
            let dent6 = await fetchIp('https://6.ident.me');
            renderIp(mainLabel, 'main4', 'main6', { ipv4: dent4, ipv6: dent6 });
        })()
    </script>
</body>
</html>
