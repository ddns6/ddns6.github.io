<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ip检测</title>
<!-- 二维码库 -->
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<!-- 条形码库 -->
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden;background:#1a1a1a}
body{font-family:system-ui;padding:10px;color:#fff}
.box{background:#2d2d2d;border-radius:8px;width:100%;margin-bottom:5px;padding:12px 10px}
.item{display:flex;align-items:center;flex-wrap:nowrap;gap:5px;font-size:clamp(12px,calc((100% - 20px)/76),18px)}
label{flex-shrink:0;min-width:5px;font-weight:bold;white-space:nowrap}
.ip-group{display:flex;gap:3px;flex:1;min-width:0}
.nat-item{margin-top:5px;display:flex;align-items:center;gap:2px}
.sep{color:#aaa;padding:0 2px}
.jump-btn{padding:1px 2px;border:none;border-radius:8px;background:#409eff;color:#fff;flex-shrink:0}
.jump-btn:active{background:#337ecc}
#dentBox{display:none;}

/* 双栏二维码布局 */
.qrcode-row{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin-top:1px}
.qrcode-card{background:#2d2d2d;border-radius:10px;padding:0px;display:flex;flex-direction:column;align-items:center;width:100%}
.card-title{margin-bottom:0px;font-size:15px;color:#ccc;text-align:center}
/* 正方形容器，预留内边距，防止内容裁切 */
.qr-canvas-box{
    width:100%;
    aspect-ratio:1/1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0px;
}
/* canvas严格等比例完整容纳，不会溢出裁切 */
.qr-canvas-box canvas{
    width:100%;
    height:100%;
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    background:#fff;
    padding:0px;
    border-radius:6px;
}

/* 条形码区域样式 - 去掉黑色边框，容器改为白色 */
.barcode-box{
    background:#2d2d2d;
    border-radius:8px;
    width:100%;
    margin:5px 0;
    padding:0px 10px;
    text-align:center;
}
#barcodeWrap{
    background:#fff;
    padding:8px;
    border-radius:6px;
    display:inline-block;
    max-width:100%;
    overflow-x:auto;
    border: none; /* 去掉边框 */
}
#barcodeWrap canvas{
    max-width:100%;
    height:auto;
    background:#fff;
}
/* 空状态提示 */
#barcodeWrap.empty::before{
    content:"实时条码展示区";
    color:#666;
    font-size:14px;
    display:block;
    padding:7px;
}

.input-area{margin-top:5px;width:100%}
#textInput{width:100%;padding:12px;background:#2d2d2d;border:2px solid #555;border-radius:8px;color:#fff;font-size:16px;min-height:100px}
#textInput:focus{outline:none;border-color:#409eff}
</style>
</head>
<body>
<div class="box" id="mainBox">
  <div class="item">
    <label>pod</label>
    <div class="ip-group">
      <span id="v4">加载中</span>
      <span id="v6">加载中</span>
    </div>
  </div>
  <div class="item nat-item">
    <label>NAT</label>
    <span id="nat">检测中</span>
    <span class="sep">|</span>
    <button id="btnIps" class="jump-btn">ips</button>
    <span class="sep">|</span>
    <button id="btnIpd" class="jump-btn">ipd</button>
    <span class="sep">|</span>
    <button id="btnIpc" class="jump-btn">ipc</button>
  </div>
</div>
<div class="box" id="dentBox">
  <div class="item">
    <label>dent</label>
    <div class="ip-group">
      <span id="dent4">加载中</span>
      <span id="dent6">加载中</span>
    </div>
  </div>
</div>

<!-- 双区域二维码 -->
<div class="qrcode-row">
  <div class="qrcode-card">
    <div class="card-title"></div>
    <div class="qr-canvas-box" id="qrWrap"></div>
  </div>
  <div class="qrcode-card">
    <div class="card-title"></div>
    <div class="qr-canvas-box" id="customQrWrap"></div>
  </div>
</div>

<!-- 条形码区域（输入框上方） -->
<div class="barcode-box">
  <div id="barcodeWrap" class="empty"></div>
</div>

<!-- 输入区域 -->
<div class="input-area box">
  <textarea id="textInput" placeholder="网址、文字，实时生成二维码和条形码"></textarea>
</div>

<script>// 按钮跳转
document.getElementById('btnIps').onclick = ()=>location.href="ips";
document.getElementById('btnIpd').onclick = ()=>location.href="ipd";
document.getElementById('btnIpc').onclick = ()=>location.href="ipc";

async function getIP(url, t=1500){
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(),t);
  try{
    const res = await fetch(url,{signal:ctrl.signal});
    clearTimeout(timer);
    return res.ok ? (await res.text()).trim() : null;
  }catch{
    clearTimeout(timer);
    return null;
  }
}

function getLocalPrivateIp(){
  return new Promise(resolve=>{
    const pc = new RTCPeerConnection();
    pc.createDataChannel('local');
    let localIp = "";
    pc.onicecandidate = evt=>{
      if(!evt.candidate) return;
      const arr = evt.candidate.candidate.split(' ');
      if(arr[7] === "host") localIp = arr[4];
    }
    pc.createOffer().then(sdp=>pc.setLocalDescription(sdp));
    pc.onicegatheringstatechange = ()=>{
      pc.close();
      resolve(localIp);
    }
  })
}

function testStun(url, timeout=2000){
  return new Promise(resolve=>{
    const pc = new RTCPeerConnection({iceServers:[{urls:url}]});
    pc.createDataChannel("test");
    let result = null;
    let done = false;
    const timer = setTimeout(()=>{done=true;pc.close();resolve(null)},timeout);
    pc.onicecandidate = e=>{
      if(done||!e.candidate) return;
      const arr = e.candidate.candidate.split(" ");
      if(arr[7]==="srflx"){
        result = {ip:arr[4],port:Number(arr[5])};
      }
    }
    pc.createOffer().then(s=>pc.setLocalDescription(s));
    pc.onicegatheringstatechange = ()=>{
      if(pc.iceGatheringState==="complete"&&!done){
        clearTimeout(timer);
        done=true;pc.close();resolve(result);
      }
    }
  })
}

const stunList = [
  "stun:stun.miwifi.com:3478",
  "stun:global.stun.twilio.com:3478",
  "stun:stun.voipbuster.com:3478"
];

// 二维码渲染
function renderQR(containerId, content){
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  if(!content.trim()) return;
  try{
    const canvas = document.createElement("canvas");
    QRCode.toCanvas(canvas, content, {width:180});
    container.appendChild(canvas);
  }catch(err){
    container.innerHTML = "<p style='color:#f00'>生成失败</p>";
  }
}

// 改用 canvas 渲染条形码，去掉边框，背景纯白
function renderBarcode(content){
  const wrap = document.getElementById("barcodeWrap");
  wrap.innerHTML = "";
  wrap.classList.remove("empty");
  
  if(!content.trim()){
    wrap.classList.add("empty");
    return;
  }
  
  try{
    const canvas = document.createElement("canvas");
    wrap.appendChild(canvas);
    // displayValue: false 隐藏条码下方文字，margin:0 消除空白边距
    JsBarcode(canvas, content, {
      format: "CODE128",
      displayValue: false,
      height: 30,
      width: 2,
      margin: 0,
      background: "#ffffff",
      lineColor: "#000000"
    });
  }catch(err){
    console.error("条码生成错误:", err);
    wrap.innerHTML = "<p style='color:#f00; margin:0; padding:0px 0;'>条码拒绝汉字</p>";
  }
}

(async ()=>{
  let ip4 = await getIP("https://ipv4.ddnspod.com");
  let ip6 = await getIP("https://ipv6.ddnspod.com");
  if(!ip4 || !ip6){
    ip4 = await getIP("https://4.ident.me");
    ip6 = await getIP("https://6.ident.me");
  }
  document.getElementById("v4").innerText = ip4 || "获取失败";
  document.getElementById("v6").innerText = ip6 || "获取失败";
  if(ip6){
    renderQR("qrWrap",`http://[${ip6}]:8088`);
  }
})()

setTimeout(async()=>{
  const localIp = await getLocalPrivateIp();
  const resultArr = [];
  for(let item of stunList){
    const ret = await testStun(item);
    if(ret) resultArr.push(ret);
  }
  const natDom = document.getElementById("nat");
  if(resultArr.length < 2){
    natDom.innerText = "STUN节点连通不足，无法判定";
    return;
  }
  const first = resultArr[0];
  const portSet = new Set(resultArr.map(item=>item.port));
  const ipSet = new Set(resultArr.map(item=>item.ip));
  if(localIp === first.ip && portSet.size === 1){
    natDom.innerText = "1 全锥";
  }else if(portSet.size === 1){
    natDom.innerText = "2 受限锥";
  }else if(ipSet.size === 1){
    natDom.innerText = "3 端口受限锥";
  }else{
    natDom.innerText = "4 对称";
  }
},300)

// 输入监听：同步生成二维码 + 条形码
document.getElementById("textInput").addEventListener("input",(e)=>{
  const val = e.target.value;
  renderQR("customQrWrap", val);
  renderBarcode(val);
})

// 页面加载时，主动触发一次渲染
window.addEventListener("load", ()=>{
  const val = document.getElementById("textInput").value;
  renderBarcode(val);
});
</script>
</body>
</html>
