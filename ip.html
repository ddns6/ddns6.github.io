<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden;background:#1a1a1a}
body{font-family:system-ui;padding:10px;color:#fff}
.box{background:#2d2d2d;border-radius:8px;width:100%;margin-bottom:5px;padding:5px 10px}
.item{display:flex;align-items:center;flex-wrap:nowrap;gap:5px;font-size:clamp(12px,calc((100% - 20px)/76),18px)}
label{flex-shrink:0;min-width:24px;font-weight:bold;white-space:nowrap;font-size:11px;line-height:1}
.ip-group{display:flex;gap:3px;flex:1;min-width:0}
.nat-item{margin-top:1px;display:flex;align-items:center;gap:6px}
/* NAT文字和IP字号统一，不再放大 */
.nat-item label{font-size:12px;font-weight:bold;min-width:auto;}
.sep{color:#aaa;padding:0 1px}
.jump-btn{padding:0px 3px;border:none;border-radius:3px;background:#409eff;color:#fff;flex-shrink:0}
.jump-btn:active{background:#337ecc}
#dentBox{display:none;}

/* 测速样式适配深色页面 */
:root {
    --bg-color: #1a1a1a;
    --card-bg: #2d2d2d;
    --text-main: #fff;
    --text-gray: #a0a0a8;
    --border-color: #444;
    --primary-blue: #409eff;
    --success-green: #09b85c;
    --danger-red: #ff4542;
    --progress-bg: #2c2c38;
    --item-h: 36px;
    --radius: 6px;
}
.dark-theme {
    --bg-color: #121217;
    --card-bg: #222730;
    --text-main: #f0f0f0;
    --text-gray: #a0a0a8;
    --border-color: #555;
}
.flex-row-fixed {
    display: flex;
    flex-direction: row !important;
    gap: 6px;
    width: 100%;
    align-items: center;
    margin-top:4px;
}
.source-col {
    flex: 0.7;
    min-width: 70px;
    position: relative;
}
.thread-col {
    flex: 0.6;
    min-width: 60px;
    position: relative;
}
.btn-wrap {
    flex: 0 0 120px;
}
.form-group {
    margin-bottom: 0;
}
.form-input, select {
    width: 100%;
    height: var(--item-h);
    border-radius: var(--radius);
    border:1px solid var(--border-color);
    background: var(--card-bg);
    color: var(--text-main);
    padding:0 8px;
    font-size:13px;
}
.hidden {
    display: none !important;
}
.btn {
    width:100%;
    height:var(--item-h);
    border-radius:var(--radius);
    border:none;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
}
.btn-primary {
    background: var(--primary-blue);
    color: #fff;
}
.btn-running {
    background: var(--success-green);
    color: #409eff;
}
.overlay-txt{
    position:absolute;
    left:0;top:0;
    width:100%;height:100%;
    display:flex;
    align-items:center;
    padding:0 8px;
    background:var(--card-bg);
    border-radius:var(--radius);
    font-size:15px;
    z-index:2;
    pointer-events:none;
}
#sourceOverlay{
    color:#f53f3f;
}
#threadOverlay{
    color:#09b85c;
}
.hide-overlay{
    display:none;
}

/* QPS压测新增样式，适配现有布局 */
.qps-row{
    display: grid;
    grid-template-columns: 0.7fr 0.6fr 1fr 120px;
    gap:6px;
    margin-top:4px;
}
.qps-col{
    display:flex;
    flex-direction:column;
    position:relative;
}
.qps-input{
    width:100%;
    height:var(--item-h);
    border-radius:var(--radius);
    border:1px solid var(--border-color);
    background:var(--card-bg);
    color:var(--text-main);
    padding:0 8px;
    font-size:13px;
}
.qps-input::placeholder{
    color:#999;
    font-size:9px;
}
.qps-stat{
    width:100%;
    height:var(--item-h);
    background:var(--progress-bg);
    border-radius:var(--radius);
    display:flex;
    align-items:center;
    justify-content:center;
    /* 默认隐藏 */
    display:none;
}
.qps-num{
    font-size:16px;
    font-weight:bold;
    color:#2574f7;
}
.qps-start{
    height:var(--item-h);
    width:100%;
    border-radius:var(--radius);
    border:none;
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    background:var(--primary-blue);
    color:#fff;
}
.qps-stop{
    height:var(--item-h);
    width:100%;
    border-radius:var(--radius);
    border:none;
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    background:var(--danger-red);
    color:#fff;
    display:none;
}

/* 双栏二维码布局 */
.qrcode-row{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin-top:1px}
.qrcode-card{background:#2d2d2d;border-radius:10px;padding:0px;display:flex;flex-direction:column;align-items:center;width:100%}
.card-title{margin-bottom:0px;font-size:15px;color:#ccc;text-align:center}
.qr-canvas-box{
    width:100%;
    aspect-ratio:1/1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0px;
}
.qr-canvas-box canvas{
    width:100%;
    height:100%;
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    background:#fff;
    padding:0px;
    border-radius:6px;
}

.barcode-box{
    background:#2d2d2d;
    border-radius:8px;
    width:100%;
    margin:5px 0;
    padding:0px 10px;
    text-align:center;
}
#barcodeWrap{
    background:#fff;
    padding:8px;
    border-radius:6px;
    display:inline-block;
    max-width:100%;
    overflow-x:auto;
    border: none;
}
#barcodeWrap canvas{
    max-width:100%;
    height:auto;
    background:#fff;
}
#barcodeWrap.empty::before{
    content:"实时条码展示区";
    color:#666;
    font-size:14px;
    display:block;
    padding:7px;
}

.input-area{margin-top:5px;width:100%}
#textInput{width:100%;padding:12px;background:#2d2d2d;border:2px solid #555;border-radius:8px;color:#fff;font-size:16px;min-height:100px}
#textInput:focus{outline:none;border-color:#409eff}
</style>

<script>
// ==========页面1原有JS开始==========
// 按钮跳转
document.getElementById('btnIps').onclick = ()=>location.href="ips";
document.getElementById('btnIpd').onclick = ()=>location.href="ipd";
document.getElementById('btnIpc').onclick = ()=>location.href="ipc";

async function getIP(url, t=1200){
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(),t);
  try{
    const res = await fetch(url,{signal:ctrl.signal});
    clearTimeout(timer);
    return res.ok ? (await res.text()).trim() : null;
  }catch{
    clearTimeout(timer);
    return null;
  }
}

// 轮询多节点获取IP，按优先级顺序：ip.sb > ident > ddnspod > icanhazip
async function getIpByPriority(urlList){
  for(let url of urlList){
    let res = await getIP(url);
    if(res) return res;
  }
  return null;
}

// IPv4优先级列表
const ipv4ApiList = [
  "https://api-ipv4.ip.sb/ip",
  "https://v4.ident.me/",
  "https://ipv4.ddnspod.com/",
  "https://ipv4.icanhazip.com/"
];
// IPv6优先级列表
const ipv6ApiList = [
  "https://api-ipv6.ip.sb/ip",
  "https://v6.ident.me/",
  "https://ipv6.ddnspod.com/",
  "https://ipv6.icanhazip.com/"
];

// 极速内网采集
function getAllLocalIp(){
  return new Promise(done=>{
    let ipv4List = new Set(),ipv6List=new Set();
    const pc = new RTCPeerConnection({iceTransportPolicy:"all"});
    pc.createDataChannel('probe');
    pc.onicecandidate = evt=>{
      if(!evt.candidate) return;
      const arr = evt.candidate.candidate.split(' ');
      if(arr[7] === "host"){
        const ip = arr[4];
        ip.includes(':') ? ipv6List.add(ip) : ipv4List.add(ip);
      }
    }
    pc.createOffer().then(sdp=>pc.setLocalDescription(sdp));
    setTimeout(()=>{
      pc.close();
      done({
        localV4:ipv4List.size ? [...ipv4List].join(' ') : '无',
        localV6:ipv6List.size ? [...ipv6List].join(' ') : '无'
      });
    },550);
  })
}

function testStun(url, timeout=1600){
  return new Promise(resolve=>{
    const pc = new RTCPeerConnection({iceServers:[{urls:url}]});
    pc.createDataChannel("test");
    let result = null,done=false;
    const timer = setTimeout(()=>{done=true;pc.close();resolve(null)},timeout);
    pc.onicecandidate = e=>{
      if(done||!e.candidate) return;
      const arr = e.candidate.candidate.split(" ");
      if(arr[7]==="srflx") result = {ip:arr[4],port:Number(arr[5])};
    }
    pc.createOffer().then(s=>pc.setLocalDescription(s));
    pc.onicegatheringstatechange = ()=>{
      if(pc.iceGatheringState==="complete"&&!done){
        clearTimeout(timer);done=true;pc.close();resolve(result);
      }
    }
  })
}

// ==========页面2测速JS开始==========
let isDark = false;
let isRunning = false;
let abortControllers = [];
let totalBytes = 0;
let lastBytes = 0;
let startTime = Date.now();
const sourceSelect = document.getElementById('sourceSelect');
const customLinkGroup = document.getElementById('customLinkGroup');
const customLinkInput = document.getElementById('customLink');
const threadCountInput = document.getElementById('threadCount');
const actionBtn = document.getElementById('actionBtn');
const sourceOverlay = document.getElementById('sourceOverlay');
const threadOverlay = document.getElementById('threadOverlay');
const btnDefaultTxt = "开测";

sourceSelect.addEventListener('change', () => {
    customLinkGroup.classList.toggle('hidden', sourceSelect.value !== 'custom');
})

function formatByte(size) {
    if (size < 1024) return `${size.toFixed(0)}B`;
    if (size < 1024 * 1024) return `${(size / 1024).toFixed(2)}KB`;
    if (size < 1024 * 1024 * 1024) return `${(size / 1024 / 1024).toFixed(2)}MB`;
    return `${(size / 1024 / 1024 / 1024).toFixed(2)}GB`;
}

async function fetchLoop(url) {
    const controller = new AbortController();
    abortControllers.push(controller);
    while (isRunning) {
        try {
            const res = await fetch(url, { signal: controller.signal, cache: 'no-cache' });
            const reader = res.body.getReader();
            while (isRunning) {
                const { done, value } = await reader.read();
                if (done) break;
                totalBytes += value.length;
            }
        } catch (err) { continue; }
    }
}
function toggleAction() {
    if (isRunning) {
        stopAllTask();
        return;
    }
    // 开始测速切深色加深主题
    isDark = true;
    document.body.classList.add('dark-theme');

    let targetUrl = sourceSelect.value;
    if(targetUrl === 'custom'){
        targetUrl = customLinkInput.value.trim();
        if(!targetUrl){
            alert('请填写自定义链接');
            return;
        }
    }
    if (!targetUrl) { alert('选择源'); return; }
    let threadNum = Number(threadCountInput.value);
    if(isNaN(threadNum) || threadNum <1){
        alert("选择线程");
        return;
    }
    isRunning = true;
    totalBytes = lastBytes = 0;
    startTime = Date.now();
    actionBtn.className = 'btn btn-running';
    sourceOverlay.classList.remove('hide-overlay');
    threadOverlay.classList.remove('hide-overlay');
    for (let i = 0; i < threadNum; i++) fetchLoop(targetUrl);
    const timer = setInterval(() => {
        if (!isRunning) { clearInterval(timer); return; }
        const now = Date.now();
        const delta = (now - startTime)/1000 || 0.01;
        const spdB = (totalBytes - lastBytes)/delta;
        const mbps = (spdB *8 /1000000).toFixed(2);
        sourceOverlay.textContent = ""+formatByte(totalBytes);
        threadOverlay.textContent = ""+formatByte(spdB)+"/s";
        actionBtn.textContent = mbps + "Mbps";
        lastBytes = totalBytes;
        startTime = now;
    },500);
}
function stopAllTask() {
    isRunning = false;
    abortControllers.forEach(c=>c.abort());
    abortControllers = [];
    actionBtn.className = 'btn btn-primary';
    actionBtn.textContent = btnDefaultTxt;
    sourceOverlay.classList.add('hide-overlay');
    threadOverlay.classList.add('hide-overlay');
    //停止测速恢复页面默认深色（移除dark-theme）
    isDark = false;
    document.body.classList.remove('dark-theme');
}
// ==========页面2测速JS结束==========

// ==========QPS压测JS新增代码==========
let qpsTimer = null;
let reqCount = 0;
let qpsNum = 250;
let maxReqCount = 100 * 10000;
let domainHost = ".360.cn";
let lastSecond = 0;
let secondReqCnt = 0;

function $(id){return document.getElementById(id)}

function start(){
    if(qpsTimer) return;
    qpsNum = parseInt($("qps").value) || 250;
    maxReqCount = parseInt($("total").value || 1) * 10000;
    domainHost = $("host").value.trim() || ".360.cn";

    //隐藏输入框，显示统计框
    $("qps").style.display = "none";
    $("total").style.display = "none";
    $("qpsShow").style.display = "flex";
    $("countShow").style.display = "flex";
    $("startBtn").style.display = "none";
    $("stopBtn").style.display = "block";

    let perMs = 1000 / qpsNum;
    qpsTimer = setInterval(()=>{
        if(reqCount >= maxReqCount){stop();return;}
        sendReq();
    }, perMs);
}

function stop(){
    clearInterval(qpsTimer);
    qpsTimer = null;
    reqCount = 0;
    secondReqCnt = 0;
    $("count").innerText = 0;
    $("currentQps").innerText = 0;

    //恢复输入框，隐藏统计框
    $("qps").style.display = "";
    $("total").style.display = "";
    $("qpsShow").style.display = "none";
    $("countShow").style.display = "none";
    $("startBtn").style.display = "block";
    $("stopBtn").style.display = "none";
}

function sendReq(){
    reqCount++;
    secondReqCnt++;
    let now = Math.floor(Date.now()/1000);
    if(now !== lastSecond){
        lastSecond = now;
        $("currentQps").innerText = secondReqCnt;
        secondReqCnt = 0;
    }
    $("count").innerText = reqCount;

    let rand = Math.random().toString(36).substr(2,10);
    let url = `https://${rand}${domainHost}/favicon.ico?${Math.random()}`;
    let img = new Image();
    img.src = url;
    img.onload = img.onerror = ()=>{};
}
</script>
