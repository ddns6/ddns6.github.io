<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>本机公网IP</title>
    <style>
        body {font-family: system-ui; padding: 30px; background:#f5f5f5}
        .box{background:#fff;padding:20px;border-radius:8px;max-width:600px}
        .item{margin:12px 0;font-size:16px}
        label{display:inline-block;width:60px;font-weight:bold}
    </style>
</head>
<body>
<div class="box">
    <div class="item">
        <label>pod：</label>
        <span id="pod4">加载中...</span>
        <span id="pod6">加载中...</span>
    </div>
</div>
<div class="box">
    <div class="item">
        <label>dent：</label>
        <span id="dent4">加载中...</span>
        <span id="dent6">加载中...</span>
    </div>
</div>

<script>
// 封装获取IP函数
async function getIp(url, domId) {
    try {
        const res = await fetch(url, {mode: 'cors'});
        if (!res.ok) throw new Error('获取失败');
        const ip = await res.text();
        document.getElementById(domId).innerText = ip.trim() || '未获取到';
    } catch (err) {
        document.getElementById(domId).innerText = '当前网络无该地址';
    }
}

// 同时请求两个接口
getIp('https://ipv4.ddnspod.com', 'pod4');
getIp('https://ipv6.ddnspod.com', 'pod6');
getIp('https://4.ident.me', 'dent4');
getIp('https://6.ident.me', 'dent6');
</script>
</body>
</html>
