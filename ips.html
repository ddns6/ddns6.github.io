<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线测速聚合</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{height:100%;font-family:"Microsoft YaHei",sans-serif;background:#fff;}
        /* 主容器占满全屏 */
        .wrap{
            width:100%;
            height:100vh;
            display:flex;
            flex-direction:column;
        }
        /* 内容区自动占剩余高度 */
        .frame-box{
            flex:1;
            overflow:auto;
        }
        iframe{
            width:100%;
            height:100%;
            border:none;
            display:block;
        }
        /* 底部导航统一固定高度 */
        .navbar{
            width:100%;
            height:55px;
            background:#f5f5f5;
            box-shadow:0 -2px 6px rgba(0,0,0,0.15);
            display:flex;
            justify-content:space-around;
            align-items:center;
            flex-shrink:0;
            z-index:999;
        }
        .nav-btn{
            flex:1;
            height:100%;
            line-height:55px;
            text-align:center;
            text-decoration:none;
            color:#333;
            font-size:14px;
            transition:0.2s;
        }
        .nav-btn:hover{color:#ff7e00;}
        .active-btn{
            color:#ff7e00;
            border-bottom:3px solid #ff7e00;
        }
        /* 加载提示 */
        .loading{
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            background:rgba(0,0,0,0.6);
            color:#fff;
            padding:10px 20px;
            border-radius:6px;
            display:none;
            z-index:1000;
        }
        /* 倒计时弹窗样式 */
        .countdown-modal{
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 20px 25px;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
            z-index: 1001;
            display: none;
            text-align: center;
        }
        .modal-tip{
            font-size: 15px;
            color: #333;
            margin-bottom: 8px;
        }
        .count-text{
            color: #ff5722;
            font-weight: bold;
        }
        .download-btn{
            display: inline-block;
            padding: 8px 18px;
            margin: 0 8px;
            background: #ff7e00;
            color: #fff;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
        /* 小屏适配 */
        @media (max-width:480px){
            .navbar{height:50px;}
            .nav-btn{font-size:12px;line-height:50px;}
            .countdown-modal{
                width: 95%;
                padding: 8px;
            }
            .download-btn{
                margin: 6px 0px;
                padding: 7px 12px;
            }
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="frame-box">
        <iframe id="mainFrame" src="https://speed.qlu.edu.cn/" sandbox="allow-same-origin allow-scripts allow-forms"></iframe>
    </div>
    <div class="loading">加载中...</div>

    <div class="countdown-modal" id="countModal">
        <div class="modal-tip">•开溜⏱️<span class="count-text" id="countNum">3</span>•</div>
        <div>
            <a href="https://yxssp.lanzouv.com/b0q2llej" class="download-btn" target="_blank">Ookla.afia</a>
            <a href="https://dlcv2.cnspeedtest.cn:8443/TaierAndroid/download/globalspeed_down.html" class="download-btn" target="_blank">全球网测</a>
            <a href="https://m.oppojia.com/app/52638070.html" class="download-btn" target="_blank">花瓣测速</a>
            <a href="https://base.hjq.komect.com/digitalhome/speedDetectHjq/index.html#/" class="download-btn" target="_blank">爱家网页</a>
        </div>
        <div style="margin-top:-9px;">
            <a href="https://yxssp.lanzoui.com/b478866/" class="download-btn" target="_blank">1DM.cajd</a>
            <a href="https://www.freedownloadmanager.org/zh/download.htm#android" class="download-btn" target="_blank">FDM</a>
            <a href="https://dl.xunlei.com/wap/index.html" class="download-btn" target="_blank">迅雷</a>
            <a href="https://download.bitcomet.com/apk/" class="download-btn" target="_blank">比特彗星</a>
        </div>
        <div style="margin-top:-9px;">
            <a href="https://mirrors6.tuna.tsinghua.edu.cn/deepin-cd/" class="download-btn" target="_blank">清华源</a>
            <a href="https://mirrors.bfsu.edu.cn/deepin-cd/" class="download-btn" target="_blank">北外</a>
            <a href="https://mirrors.nju.edu.cn/deepin-cd/" class="download-btn" target="_blank">南大</a>
            <a href="https://mirrors.ustc.edu.cn/deepin-cd/releases/" class="download-btn" target="_blank">中科源</a>
        </div>
        <div style="margin-top:-9px;">
            <a href="http://h5.appstore.vivo.com.cn/#/" class="download-btn" target="_blank">v</a>
            <a href="https://m.wandoujia.com/" class="download-btn" target="_blank">豌</a>
            <a href="https://www.yxssp.com/" class="download-btn" target="_blank">异</a>
            <a href="https://www.ghxi.com/category/all/android" class="download-btn" target="_blank">果</a>
            <a href="https://apkpure.com/cn/search" class="download-btn" target="_blank">a</a>
        </div>
    </div>

    <div class="navbar">
        <a href="#" class="nav-btn active-btn" data-url="https://speed.qlu.edu.cn/">齐鲁</a>
        <a href="#" class="nav-btn" data-url="https://fs.nju.edu.cn/speed/">南光</a>
        <a href="https://speedtest.im/" target="_blank" class="nav-btn open-new-tab">一键⇗</a>
        <a href="https://librespeed.speedtestcustom.com/" target="_blank" class="nav-btn open-new-tab">lib⇗</a>
    </div>
</div>

<script>
const navButtons = document.querySelectorAll('.nav-btn');
const mainFrame = document.getElementById('mainFrame');
const loading = document.querySelector('.loading');
const countModal = document.getElementById('countModal');
const countNum = document.getElementById('countNum');
let timer = null;
let second = 3;
let firstLoad = true;

function closeModal() {
    clearInterval(timer);
    countModal.style.display = 'none';
}

navButtons.forEach(btn => {
    btn.addEventListener('click', (e) => {
        if (btn.classList.contains('open-new-tab')) {
            return;
        }
        e.preventDefault();
        navButtons.forEach(b => b.classList.remove('active-btn'));
        btn.classList.add('active-btn');
        loading.style.display = 'block';
        
        closeModal();
        second = 3;
        countNum.innerText = second;
        mainFrame.src = btn.dataset.url;
        firstLoad = false;
    });
});

document.querySelectorAll('.download-btn').forEach(btn => {
    btn.addEventListener('click', closeModal);
});

// iframe加载完成
mainFrame.onload = function(){
    closeModal();
    second = 3;
    countNum.innerText = second;

    if (firstLoad) {
        countModal.style.display = 'block';
        timer = setInterval(() => {
            second--;
            countNum.innerText = second;
            if(second <= 0){
                closeModal();
            }
        }, 1000);
    }
    loading.style.display = 'none';
}
</script>
</body>
</html>
