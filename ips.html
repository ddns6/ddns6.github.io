<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线测速聚合</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{height:100%;font-family:"Microsoft YaHei",sans-serif;background:#fff;}
        /* 主容器占满全屏 */
        .wrap{
            width:100%;
            height:100vh;
            display:flex;
            flex-direction:column;
        }
        /* 内容区自动占剩余高度 */
        .frame-box{
            flex:1;
            overflow:auto;
        }
        iframe{
            width:100%;
            height:100%;
            border:none;
            display:block;
        }
        /* 底部导航统一固定高度 */
        .navbar{
            width:100%;
            height:55px;
            background:#f5f5f5;
            box-shadow:0 -2px 6px rgba(0,0,0,0.15);
            display:flex;
            justify-content:space-around;
            align-items:center;
            flex-shrink:0;
            z-index:999;
        }
        .nav-btn{
            flex:1;
            height:100%;
            line-height:55px;
            text-align:center;
            text-decoration:none;
            color:#333;
            font-size:14px;
            transition:0.2s;
        }
        .nav-btn:hover{color:#ff7e00;}
        .active-btn{
            color:#ff7e00;
            border-bottom:3px solid #ff7e00;
        }
        /* 加载提示 */
        .loading{
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            background:rgba(0,0,0,0.6);
            color:#fff;
            padding:10px 20px;
            border-radius:6px;
            display:none;
            z-index:1000;
        }
        /* 小屏适配 */
        @media (max-width:480px){
            .navbar{height:50px;}
            .nav-btn{font-size:12px;line-height:50px;}
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="frame-box">
        <iframe id="mainFrame" src="https://speed.qlu.edu.cn/" sandbox="allow-same-origin allow-scripts allow-forms"></iframe>
    </div>
    <div class="loading">加载中...</div>
    <div class="navbar">
        <a href="#" class="nav-btn active-btn" data-url="https://speed.qlu.edu.cn/">齐鲁</a>
        <a href="#" class="nav-btn" data-url="https://fs.nju.edu.cn/speed/">南光</a>
        <a href="#" class="nav-btn" data-url="https://speedtest.zju.edu.cn/">浙大</a>
        <!-- 给这两个加上 target="_blank"，并加上标记 -->
        <a href="https://test.nju.edu.cn/" target="_blank" class="nav-btn open-new-tab">南大⇗</a>
        <a href="https://speedtest.im/" target="_blank" class="nav-btn open-new-tab">一键⇗</a>
        <a href="https://librespeed.speedtestcustom.com/" target="_blank" class="nav-btn open-new-tab">lib⇗</a>
        <a href="https://www.speedtest.net/zh-Hans?a=1" target="_blank" class="nav-btn open-new-tab">ST⇗</a>
        <a href="https://base.hjq.komect.com/digitalhome/speedDetectHjq/index.html#/" target="_blank" class="nav-btn open-new-tab">移动⇗</a>
        <a href="https://dlcv2.cnspeedtest.cn:8443/TaierAndroid/download/globalspeed_down.html" target="_blank" class="nav-btn open-new-tab">全球⇗</a>
    </div>
</div>

<script>
const navButtons = document.querySelectorAll('.nav-btn');
const mainFrame = document.getElementById('mainFrame');
const loading = document.querySelector('.loading');

navButtons.forEach(btn => {
    btn.addEventListener('click', (e) => {
        // 如果是新窗口打开的按钮，直接 return，不执行iframe逻辑
        if (btn.classList.contains('open-new-tab')) {
            return;
        }
        e.preventDefault();
        // 切换激活样式
        navButtons.forEach(b => b.classList.remove('active-btn'));
        btn.classList.add('active-btn');
        // 显示加载
        loading.style.display = 'block';
        // 切换地址
        const url = btn.dataset.url;
        mainFrame.src = url;
    });
});

// 加载完成隐藏提示
mainFrame.onload = function(){
    loading.style.display = 'none';
}
</script>
</body>
</html>
