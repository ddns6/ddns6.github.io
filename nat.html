<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>NAT类型检测（对标dyebean.com）</title>
<style>
:root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --success: #3fb950;
    --warn: #d29922;
    --danger: #f85149;
    --blue: #58a6ff;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    min-height: 100vh;
}
.container {
    max-width: 500px;
    margin: 0 auto;
}
.card {
    background: var(--card);
    border-radius: 16px;
    padding: 30px 24px;
    border: 1px solid var(--border);
    text-align: center;
}
.grade-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: #21262d;
    margin: 0 auto 24px;
    display: grid;
    place-items: center;
    font-size: 48px;
    font-weight: bold;
    color: var(--warn);
}
.nat-title {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 12px;
}
.nat-desc {
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 24px;
}
.status-tag {
    display: inline-block;
    background: rgba(210, 153, 34, 0.15);
    color: var(--warn);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    margin-bottom: 32px;
}
.info-row {
    background: #21262d;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 12px;
    text-align: left;
}
.info-label {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 6px;
}
.info-value {
    font-size: 18px;
    font-weight: 500;
    word-break: break-all;
}
.btn {
    margin-top: 24px;
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #21262d;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
}
.btn:hover {
    background: #30363d;
}
</style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="grade-circle" id="grade">检测中</div>
        <div class="nat-title" id="natTitle">NAT 类型检测中</div>
        <div class="nat-desc" id="natDesc">正在探测你的网络NAT结构，请稍候...</div>
        <div class="status-tag" id="status">检测中...</div>

        <div class="info-row">
            <div class="info-label">公网 IP</div>
            <div class="info-value" id="publicIp">--</div>
        </div>
        <div class="info-row">
            <div class="info-label">本地 IP (内网)</div>
            <div class="info-value" id="localIp">--</div>
        </div>
        <div class="info-row">
            <div class="info-label">STUN 服务器</div>
            <div class="info-value" id="stunServer">stun.miwifi.com:3478</div>
        </div>
        <div class="info-row">
            <div class="info-label">检测耗时</div>
            <div class="info-value" id="costTime">--</div>
        </div>
        <div class="info-row">
            <div class="info-label">ICE 候选项详情</div>
            <div class="info-value" id="iceDetail">--</div>
        </div>

        <button class="btn" onclick="startDetect()">🔄 重新检测</button>
    </div>
</div>

<script>
const el = {
    grade: document.getElementById('grade'),
    natTitle: document.getElementById('natTitle'),
    natDesc: document.getElementById('natDesc'),
    status: document.getElementById('status'),
    publicIp: document.getElementById('publicIp'),
    localIp: document.getElementById('localIp'),
    stunServer: document.getElementById('stunServer'),
    costTime: document.getElementById('costTime'),
    iceDetail: document.getElementById('iceDetail'),
}

const stunServers = [
    {url: 'stun:stun.miwifi.com:3478'},
    {url: 'stun:stun.l.google.com:19302'}
]

function parseIceCandidate(candidate) {
    const parts = candidate.split(' ');
    const type = parts[7];
    const ip = parts[4];
    const port = parts[5];
    return { type, ip, port };
}

function isPrivateIPv4(ip) {
    return (
        ip.startsWith('10.') ||
        (ip.startsWith('172.') && parseInt(ip.split('.')[1], 10) >= 16 && parseInt(ip.split('.')[1], 10) <= 31) ||
        ip.startsWith('192.168.')
    );
}

async function detectNAT() {
    return new Promise((resolve, reject) => {
        const pc = new RTCPeerConnection({
            iceServers: stunServers,
            iceTransportPolicy: 'all'
        });

        let candidates = [];
        let startTime = Date.now();

        pc.createDataChannel('nat-test');
        pc.createOffer()
            .then(offer => pc.setLocalDescription(offer))
            .catch(reject);

        pc.onicecandidate = (e) => {
            if (!e.candidate) return;
            const c = parseIceCandidate(e.candidate.candidate);
            if (!c.ip || c.ip.includes(':')) return; // 只留IPv4
            candidates.push(c);
        };

        pc.onicegatheringstatechange = () => {
            if (pc.iceGatheringState === 'complete') {
                pc.close();
                let hostCandidates = candidates.filter(x => x.type === 'host');
                let srflxCandidates = candidates.filter(x => x.type === 'srflx');

                let localIp = hostCandidates[0]?.ip || '未知';
                let publicIp = srflxCandidates[0]?.ip || '未知';
                let publicPort = srflxCandidates[0]?.port || '未知';

                let natType = '未知';
                let grade = '?';
                let desc = '';

                if (publicIp && isPrivateIPv4(publicIp)) {
                    natType = '对称NAT (NAT3/4)';
                    grade = 'C';
                    desc = '运营商CGNAT或对称NAT，P2P联机/异地组网会受限。';
                } else if (srflxCandidates.length > 0 && hostCandidates.length > 0) {
                    natType = '受限锥形NAT (NAT2)';
                    grade = 'B';
                    desc = '受限锥形NAT，大部分应用可正常使用，少数P2P场景可能受限。';
                } else if (srflxCandidates.length === 0 && hostCandidates.length > 0 && !isPrivateIPv4(hostCandidates[0].ip)) {
                    natType = '完全锥形NAT / 公网直连 (NAT1)';
                    grade = 'A';
                    desc = '全连通公网环境，P2P联机/异地组网无限制，体验最佳。';
                } else {
                    natType = '对称NAT / 严格NAT (NAT3/4)';
                    grade = 'C';
                    desc = '严格对称NAT，多数P2P应用无法正常工作。';
                }

                resolve({
                    grade,
                    natType,
                    desc,
                    localIp,
                    publicIp,
                    publicPort,
                    cost: Date.now() - startTime,
                    iceTypes: [...new Set(candidates.map(x => x.type))].join(', ')
                });
            }
        };

        setTimeout(() => {
            pc.close();
            reject('检测超时');
        }, 15000);
    });
}

async function getPublicIPv4() {
    const apis = [
        'https://api.ipify.org?format=json',
        'https://ipv4.icanhazip.com'
    ];
    for (const api of apis) {
        try {
            const res = await fetch(api, { signal: AbortSignal.timeout(3000) });
            if (api.includes('icanhazip')) {
                return await res.text();
            } else {
                const d = await res.json();
                return d.ip;
            }
        } catch (e) { continue; }
    }
    return '获取失败';
}

async function startDetect() {
    el.grade.textContent = '检测中';
    el.natTitle.textContent = 'NAT 类型检测中';
    el.natDesc.textContent = '正在探测你的网络NAT结构，请稍候...';
    el.status.textContent = '检测中...';
    el.publicIp.textContent = '--';
    el.localIp.textContent = '--';
    el.costTime.textContent = '--';
    el.iceDetail.textContent = '--';

    try {
        const [natRes, ipRes] = await Promise.all([detectNAT(), getPublicIPv4()]);
        el.grade.textContent = natRes.grade;
        el.natTitle.textContent = natRes.natType;
        el.natDesc.textContent = natRes.desc;
        el.status.textContent = '连通性良好';
        el.publicIp.textContent = ipRes || natRes.publicIp;
        el.localIp.textContent = natRes.localIp;
        el.costTime.textContent = `${natRes.cost}ms`;
        el.iceDetail.textContent = `候选项类型: ${natRes.iceTypes}\nServer Reflexive: ${natRes.publicIp}:${natRes.publicPort}`;

        if (natRes.grade === 'A') {
            el.grade.style.color = 'var(--success)';
        } else if (natRes.grade === 'B') {
            el.grade.style.color = 'var(--warn)';
        } else {
            el.grade.style.color = 'var(--danger)';
        }
    } catch (err) {
        el.natTitle.textContent = '检测失败';
        el.natDesc.textContent = err.message;
        el.status.textContent = '检测失败';
    }
}

startDetect();
</script>
</body>
</html>
