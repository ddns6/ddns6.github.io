<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>网络NAT类型（仅IPv4）检测工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:微软雅黑;background:#0f172a;color:#e2e8f0;padding:20px}
.box{max-width:700px;margin:0 auto;background:#1e293b;padding:25px;border-radius:12px}
h2{color:#38bdf8;margin-bottom:20px;text-align:center}
.item{padding:12px 0;border-bottom:1px solid #334155}
.label{color:#94a3b8}
.val{color:#22d3ee;font-weight:bold;margin-left:10px}
.tip{margin-top:15px;padding:10px;background:#1e3a5f;border-radius:6px;font-size:14px}
.load{color:#facc15}
</style>
</head>
<body>
<div class="box">
<h2>网络 NAT 类型在线检测（仅IPv4）</h2>
<div class="item"><span class="label">本机IPv4公网IP：</span><span class="val" id="ip">检测中...</span></div>
<div class="item"><span class="label">外网端口：</span><span class="val" id="port">检测中...</span></div>
<div class="item"><span class="label">NAT类型：</span><span class="val load" id="nat">识别中...</span></div>
<div class="item"><span class="label">网络环境：</span><span class="val" id="net">检测中...</span></div>
<div class="item"><span class="label">UPNP状态：</span><span class="val" id="upnp">暂不支持前端探测</span></div>

<div class="tip">
<b>NAT结果说明</b><br>
• 完全锥形NAT：全连通，P2P/组网最优<br>
• 限制锥形NAT：常用家用路由，联机正常<br>
• 端口限制锥形：部分P2P受限<br>
• 对称NAT：严格封禁，无法P2P/异地组网<br>
• 公网IP：无NAT，端口直连
</div>
</div>

<script>
let ipEl=document.getElementById('ip')
let portEl=document.getElementById('port')
let natEl=document.getElementById('nat')
let netEl=document.getElementById('net')

// 仅获取IPv4公网IP（强制用IPv4接口）
async function getPublicIPv4(){
    const apis = [
        'https://api.ipify.org?format=json',
        'https://ipv4.icanhazip.com',
        'https://httpbin.org/ip'
    ]
    for (const api of apis) {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 3000);
            const res = await fetch(api, { signal: controller.signal });
            clearTimeout(timeoutId);
            if (api.includes('icanhazip')) {
                const text = await res.text();
                return text.trim();
            } else {
                const data = await res.json();
                return data.ip || data.origin;
            }
        } catch (e) {
            continue;
        }
    }
    return '获取失败';
}

// WebRTC仅探测IPv4的NAT&端口（强制用IPv4 STUN）
function getNATv4(){
    return new Promise((res, rej)=>{
        const pc=new RTCPeerConnection({
            iceServers: [{urls:'stun:stun.l.google.com:19302'}],
            iceTransportPolicy: 'all',
            rtcpMuxPolicy: 'require'
        })
        pc.createDataChannel('test')
        pc.createOffer().then(o=>pc.setLocalDescription(o)).catch(rej)
        
        let found = false
        pc.onicecandidate=e=>{
            if(!e.candidate || found) return
            let cand = e.candidate.candidate
            // 只取IPv4类型的候选
            if(cand.includes(' udp ')){
                let arr = cand.split(' ')
                let ip = arr[4]
                let type = arr[7]
                let p = arr[5]
                // 排除IPv6和内网地址
                if(ip && !ip.includes(':') && !ip.startsWith('192.168.') && !ip.startsWith('10.') && !(ip.startsWith('172.') && parseInt(ip.split('.')[1])>=16 && parseInt(ip.split('.')[1])<=31)){
                    found = true
                    pc.close()
                    res({type:type,port:p})
                }
            }
        }
        setTimeout(()=>{
            if(!found){
                pc.close()
                rej('未找到IPv4 NAT信息')
            }
        },5000)
    })
}

function judgeNet(ip){
    if(ip.startsWith('10.')||
       (ip.startsWith('172.') && parseInt(ip.split('.')[1])>=16 && parseInt(ip.split('.')[1])<=31)||
       ip.startsWith('192.168.')){
        netEl.innerText='内网IPv4（运营商CGNAT/多层NAT）'
    }else if(ip.includes('获取失败')){
        netEl.innerText='无法判断IPv4网络环境'
    }else{
        netEl.innerText='公网IPv4（无多层转发）'
    }
}

// 并行执行IPv4 IP和NAT检测
Promise.all([
    getPublicIPv4(),
    getNATv4().catch(()=>({type:'unknown',port:'获取失败'}))
]).then(([ipRes, natRes])=>{
    ipEl.innerText = ipRes;
    judgeNet(ipRes);

    portEl.innerText = natRes.port;
    switch(natRes.type){
        case 'host':
            natEl.innerText='✅ 完全锥形NAT / 公网直连'
            natEl.style.color='#4ade80'
            break
        case 'srflx':
            natEl.innerText='🟢 限制锥形NAT（家用正常）'
            natEl.style.color='#60a5fa'
            break
        case 'prflx':
            natEl.innerText='🟡 端口限制锥形NAT'
            natEl.style.color='#facc15'
            break
        case 'relay':
            natEl.innerText='🔴 对称NAT / 严格NAT'
            natEl.style.color='#f87171'
            break
        default:
            natEl.innerText='未知NAT类型或IPv4检测失败'
            natEl.style.color='#94a3b8'
    }
})
</script>
</body>
</html>
