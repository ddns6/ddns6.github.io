<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>NAT类型检测（精准版，对标dyebean.com）</title>
<style>
:root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #c9d1d9;
    --muted: #8b949e;
    --success: #3fb950;
    --warn: #d29922;
    --danger: #f85149;
    --orange: #f0883e;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    min-height: 100vh;
}
.container {
    max-width: 500px;
    margin: 0 auto;
}
.card {
    background: var(--card);
    border-radius: 16px;
    padding: 30px 24px;
    border: 1px solid var(--border);
    text-align: center;
}
.grade-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: #21262d;
    margin: 0 auto 24px;
    display: grid;
    place-items: center;
    font-size: 48px;
    font-weight: bold;
    color: var(--warn);
}
.nat-title {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 12px;
}
.nat-desc {
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 24px;
}
.status-tag {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    margin-bottom: 32px;
}
.status-good {
    background: rgba(210, 153, 34, 0.15);
    color: var(--warn);
}
.status-normal {
    background: rgba(240, 136, 62, 0.15);
    color: var(--orange);
}
.status-bad {
    background: rgba(248, 81, 73, 0.15);
    color: var(--danger);
}
.info-row {
    background: #21262d;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 12px;
    text-align: left;
}
.info-label {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 6px;
}
.info-value {
    font-size: 18px;
    font-weight: 500;
    word-break: break-all;
}
.btn {
    margin-top: 24px;
    padding: 12px 24px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #21262d;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
}
.btn:hover {
    background: #30363d;
}
</style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="grade-circle" id="grade">检测中</div>
        <div class="nat-title" id="natTitle">NAT 类型检测中</div>
        <div class="nat-desc" id="natDesc">正在探测你的网络NAT结构，请稍候...</div>
        <div class="status-tag" id="status">检测中...</div>

        <div class="info-row">
            <div class="info-label">公网 IP</div>
            <div class="info-value" id="publicIp">--</div>
        </div>
        <div class="info-row">
            <div class="info-label">本地 IP (内网)</div>
            <div class="info-value" id="localIp">--</div>
        </div>
        <div class="info-row">
            <div class="info-label">STUN 服务器</div>
            <div class="info-value" id="stunServer">stun.miwifi.com:3478</div>
        </div>
        <div class="info-row">
            <div class="info-label">检测耗时</div>
            <div class="info-value" id="costTime">--</div>
        </div>
        <div class="info-row">
            <div class="info-label">ICE 候选项详情</div>
            <div class="info-value" id="iceDetail">--</div>
        </div>

        <button class="btn" onclick="startDetect()">🔄 重新检测</button>
    </div>
</div>

<script>
const el = {
    grade: document.getElementById('grade'),
    natTitle: document.getElementById('natTitle'),
    natDesc: document.getElementById('natDesc'),
    status: document.getElementById('status'),
    publicIp: document.getElementById('publicIp'),
    localIp: document.getElementById('localIp'),
    stunServer: document.getElementById('stunServer'),
    costTime: document.getElementById('costTime'),
    iceDetail: document.getElementById('iceDetail'),
}

// 双STUN服务器用于端口一致性校验
const stunServers = [
    {url: 'stun:stun.miwifi.com:3478'},
    {url: 'stun:stun.l.google.com:19302'}
]

function parseIceCandidate(candidate) {
    const parts = candidate.split(' ');
    const type = parts[7];
    const ip = parts[4];
    const port = parts[5];
    return { type, ip, port };
}

function isPrivateIPv4(ip) {
    return (
        ip.startsWith('10.') ||
        (ip.startsWith('172.') && parseInt(ip.split('.')[1], 10) >= 16 && parseInt(ip.split('.')[1], 10) <= 31) ||
        ip.startsWith('192.168.')
    );
}

// 从单个STUN服务器获取反射地址
async function getReflexiveAddress(stunUrl) {
    return new Promise((resolve, reject) => {
        const pc = new RTCPeerConnection({
            iceServers: [{urls: stunUrl}],
            iceTransportPolicy: 'all'
        });
        pc.createDataChannel('nat-test');
        pc.createOffer()
            .then(offer => pc.setLocalDescription(offer))
            .catch(reject);

        let found = false;
        pc.onicecandidate = (e) => {
            if (!e.candidate || found) return;
            const c = parseIceCandidate(e.candidate.candidate);
            if (c.type === 'srflx' && !c.ip.includes(':')) {
                found = true;
                pc.close();
                resolve({ip: c.ip, port: c.port});
            }
        };

        setTimeout(() => {
            pc.close();
            reject('超时');
        }, 5000);
    });
}

// 双STUN校验，区分NAT2/NAT3
async function detectNAT() {
    return new Promise(async (resolve, reject) => {
        const startTime = Date.now();
        let localIp = '';
        let hostCandidates = [];

        // 第一步：获取本地host地址
        const pcHost = new RTCPeerConnection({iceServers: []});
        pcHost.createDataChannel('host-test');
        pcHost.createOffer().then(o => pcHost.setLocalDescription(o));
        pcHost.onicecandidate = (e) => {
            if (!e.candidate) return;
            const c = parseIceCandidate(e.candidate.candidate);
            if (c.type === 'host' && !c.ip.includes(':')) {
                hostCandidates.push(c);
            }
        };
        await new Promise(r => setTimeout(r, 2000));
        pcHost.close();
        localIp = hostCandidates[0]?.ip || '未知';

        // 第二步：从两个不同STUN服务器获取反射地址
        let addr1, addr2;
        try {
            addr1 = await getReflexiveAddress(stunServers[0].url);
            addr2 = await getReflexiveAddress(stunServers[1].url);
        } catch (e) {
            reject('无法获取STUN反射地址');
            return;
        }

        const publicIp = addr1.ip;
        const port1 = addr1.port;
        const port2 = addr2.port;

        let natType = '';
        let grade = '';
        let desc = '';
        let statusClass = '';
        let statusText = '';

        // NAT1：公网直连，host地址就是公网IP
        if (!isPrivateIPv4(localIp) && localIp === publicIp) {
            natType = '完全锥形NAT / 公网直连 (NAT1)';
            grade = 'A';
            desc = '全连通公网环境，P2P联机/异地组网无限制，体验最佳。';
            statusClass = 'status-good';
            statusText = '连通性优秀';
        }
        // NAT2：受限锥形NAT，不同STUN服务器的端口相同
        else if (port1 === port2) {
            natType = '受限锥形NAT (NAT2)';
            grade = 'B';
            desc = '受限锥形NAT，大部分应用可正常使用，少数P2P场景可能受限。';
            statusClass = 'status-good';
            statusText = '连通性良好';
        }
        // NAT3：端口受限锥形NAT，不同STUN服务器的端口不同
        else {
            natType = '端口受限锥形NAT (NAT3)';
            grade = 'C';
            desc = '端口受限锥形NAT，对联机游戏、语音通话有一定影响，P2P连接可能不稳定。';
            statusClass = 'status-normal';
            statusText = '连通性一般';
        }

        resolve({
            grade,
            natType,
            desc,
            localIp,
            publicIp,
            publicPort: port1,
            cost: Date.now() - startTime,
            iceTypes: 'host, srflx',
            statusClass,
            statusText
        });
    });
}

async function getPublicIPv4() {
    const apis = [
        'https://api.ipify.org?format=json',
        'https://ipv4.icanhazip.com'
    ];
    for (const api of apis) {
        try {
            const res = await fetch(api, { signal: AbortSignal.timeout(3000) });
            if (api.includes('icanhazip')) {
                return await res.text();
            } else {
                const d = await res.json();
                return d.ip;
            }
        } catch (e) { continue; }
    }
    return '获取失败';
}

async function startDetect() {
    el.grade.textContent = '检测中';
    el.natTitle.textContent = 'NAT 类型检测中';
    el.natDesc.textContent = '正在探测你的网络NAT结构，请稍候...';
    el.status.textContent = '检测中...';
    el.status.className = 'status-tag';
    el.publicIp.textContent = '--';
    el.localIp.textContent = '--';
    el.costTime.textContent = '--';
    el.iceDetail.textContent = '--';

    try {
        const [natRes, ipRes] = await Promise.all([detectNAT(), getPublicIPv4()]);
        el.grade.textContent = natRes.grade;
        el.natTitle.textContent = natRes.natType;
        el.natDesc.textContent = natRes.desc;
        el.status.textContent = natRes.statusText;
        el.status.className = `status-tag ${natRes.statusClass}`;
        el.publicIp.textContent = ipRes || natRes.publicIp;
        el.localIp.textContent = natRes.localIp;
        el.costTime.textContent = `${natRes.cost}ms`;
        el.iceDetail.textContent = `候选项类型: ${natRes.iceTypes}\nServer Reflexive: ${natRes.publicIp}:${natRes.publicPort}`;

        if (natRes.grade === 'A') {
            el.grade.style.color = 'var(--success)';
        } else if (natRes.grade === 'B') {
            el.grade.style.color = 'var(--warn)';
        } else {
            el.grade.style.color = 'var(--orange)';
        }
    } catch (err) {
        el.natTitle.textContent = '检测失败';
        el.natDesc.textContent = err.message;
        el.status.textContent = '检测失败';
        el.status.className = 'status-tag status-bad';
        el.grade.style.color = 'var(--danger)';
    }
}

startDetect();
</script>
</body>
</html>
