<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>在线测速聚合</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body, html {
            height: 100vh;
            overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
        }
        #mainFrame {
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
            display: block;
        }
        .navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #f5f5f5;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.15);
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            z-index: 999;
        }
        .nav-btn {
            text-decoration: none;
            color: #333;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            padding: 6px 10px;
        }
        .nav-btn:hover {
            color: #ff7e00;
        }
        .active-btn {
            color: #ff7e00;
            border-bottom: 3px solid #ff7e00;
        }
        .open-new{
            color:#0066ff !important;
        }
        .loading{
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            background: rgba(0,0,0,0.6);
            color:#fff;
            padding:10px 20px;
            border-radius:6px;
            display:none;
            z-index:9999;
        }
        @media (max-width: 640px) {
            .navbar{height:50px;}
            #mainFrame{height: calc(100vh - 50px);}
            .nav-btn{font-size:12px;padding:4px 6px;}
        }
    </style>
</head>
<body>
    <div class="loading">加载中...</div>
    <iframe id="mainFrame" src="https://speed.qlu.edu.cn/"></iframe>
    
    <div class="navbar">
        <a href="#" class="nav-btn active-btn" data-type="iframe" data-url="https://speed.qlu.edu.cn/">齐鲁</a>
        <a href="#" class="nav-btn" data-type="iframe" data-url="https://speed.nuaa.edu.cn/">南航</a>
        <a href="#" class="nav-btn" data-type="iframe" data-url="https://fs.nju.edu.cn/speed/">南工</a>
        <a href="#" class="nav-btn" data-type="iframe" data-url="https://test.nju.edu.cn/">南大</a>
        <a href="#" class="nav-btn open-new" data-type="blank" data-url="https://www.speedtest.net/zh-Hans/server/singtel/">SpeedTest</a>
    </div>

    <script>
        const navButtons = document.querySelectorAll('.nav-btn');
        const mainFrame = document.getElementById('mainFrame');
        const loading = document.querySelector('.loading');

        navButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const type = btn.dataset.type;
                const url = btn.dataset.url;

                if(type === 'iframe'){
                    navButtons.forEach(b => b.classList.remove('active-btn'));
                    btn.classList.add('active-btn');
                    loading.style.display = 'block';
                    mainFrame.src = url;
                }else if(type === 'blank'){
                    window.open(url,'_blank');
                }
            });
        });
        mainFrame.onload = ()=>{
            loading.style.display = 'none';
        }
    </script>
</body>
</html>
