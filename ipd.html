<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta name="keywords" content="流量消耗器,流量测速,测速工具,网络测速,在线测速,流量测试">
    <meta name="description" content="流量消耗器提供在线流量测速与消耗功能，支持多线程测速、自定义测速链接、实时速度监控与流量统计。">

    <style>
        :root {
            --bg-color: #f7f8fa;
            --card-bg: #ffffff;
            --text-main: #111;
            --text-gray: #666;
            --border-color: #e8e8ed;
            --primary-blue: #2574f7;
            --success-green: #09b85c;
            --danger-red: #ff4542;
            --status-stop-bg: #ffe9e9;
            --status-stop-text: #e53935;
            --progress-bg: #eee;
        }
        .dark-theme {
            --bg-color: #121217;
            --card-bg: #1e1e26;
            --text-main: #f0f0f0;
            --text-gray: #a0a0a8;
            --border-color: #333340;
            --progress-bg: #2c2c38;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        .header-wrap {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        #siteTitle {
            font-size: 28px;
            font-weight: 600;
        }
        .header-buttons {
            display: flex;
            gap: 10px;
        }
        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border-color);
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-label {
            display: block;
            font-size: 16px;
            color: var(--text-gray);
            margin-bottom: 8px;
        }
        .form-input, select {
            width: 100%;
            height: 48px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-main);
            padding: 0 14px;
            font-size: 16px;
        }
        optgroup {
            font-size: 17px;
            padding: 8px 4px;
        }
        option {
            padding: 10px 6px;
        }
        .hidden {
            display: none !important;
        }
        .thread-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .thread-control {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .thread-btn {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 20px;
            cursor: pointer;
        }
        .thread-input {
            flex: 1;
            text-align: center;
        }
        .status {
            width: 100%;
            padding: 10px;
            text-align: center;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 500;
        }
        .status.stopped {
            background: var(--status-stop-bg);
            color: var(--status-stop-text);
        }
        .status.running {
            background: #e6f7ff;
            color: #0066cc;
        }
        .btn {
            width: 100%;
            height: 56px;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-primary {
            background: var(--primary-blue);
            color: #fff;
        }
        .btn-stop {
            background: var(--danger-red);
            color: #fff;
        }
        .stats-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .stat-item:last-child {
            border-bottom: none;
        }
        .stat-label {
            font-size: 16px;
            color: var(--text-gray);
        }
        .stat-value {
            font-size: 22px;
            font-weight: 500;
        }
        .stat-value.speed {
            color: var(--success-green);
        }
        #totalData {
            color: var(--primary-blue);
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--progress-bg);
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary-blue);
            width: 0%;
            transition: width 0.2s;
        }
        .limit-setting {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .limit-main {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .limit-input-wrap {
            display: flex;
            gap: 6px;
        }
        .limit-input-wrap input {
            width: 100px;
        }
        .limit-input-wrap select {
            width: 80px;
        }
        .limit-actions {
            display: flex;
            gap: 8px;
        }
        .watermark {
            margin-top: 12px;
            text-align: center;
            font-size: 13px;
            color: var(--text-gray);
            opacity: 0.6;
        }
        .card-title {
            font-size: 17px;
            font-weight: 500;
            border-left: 4px solid var(--primary-blue);
            padding-left: 8px;
            margin-bottom: 14px;
        }
        .ip-info-item {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .ip-info-label {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }
        .ip-info-value {
            font-size: 16px;
            margin-bottom: 4px;
        }
        .ip-info-location {
            font-size: 14px;
            color: var(--text-gray);
        }
        .chart-container {
            width: 100%;
            height: 280px;
        }
        .info-text {
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-gray);
        }
        .site-footer {
            text-align: center;
            margin-top: 30px;
            color: var(--text-gray);
            font-size: 14px;
        }
        .footer-dot {
            margin: 0 8px;
        }
    </style>
</head>

                    <input type="number" id="threadCount" class="form-input thread-input" value="1" min="1" max="16">
                    <button class="thread-btn" onclick="changeThread(1)">+</button>
                </div>

                <div class="stat-item">
                    <div class="stat-label">已消耗流量</div>
                    <div class="stat-value" id="totalData">0 B</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">实时速度</div>
                    <div class="stat-value speed" id="currentSpeed">0 B/s</div>
                </div>
                <div class="stat-item">

                    <div class="stat-value speed" id="currentMbps">0 Mbps</div>

                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>

                <div class="limit-main">
                    <span class="limit-label">流量上限:</span>
                    <div class="limit-input-wrap">
                        <input type="number" id="limitInput" placeholder="不限制" min="0" step="1">
                        <select id="limitUnit" aria-label="流量单位">
                            <option value="MB">MB</option>
                            <option value="GB" selected="">GB</option>
                            <option value="TB">TB</option>
                        </select>
                    </div>
                </div>
                <div class="limit-actions">
                    <button class="thread-btn" onclick="setLimit()" title="设置本次流量上限">
                        <i class="fa fa-cog"></i>
                    </button>
                    <button class="thread-btn" onclick="restoreLastStats()" title="找回上次消耗的流量">

            2. 设置运行线程数（手机建议10以内）<br>
            3. 点击"开始运行"即可消耗流量<br>
            4. 可设置流量上限，达到后自动停止<br>

    <script>
        // 全局变量
        let isDark = false;
        let isRunning = false;
        let abortControllers = [];
        let totalBytes = 0;
        let lastBytes = 0;
        let startTime = Date.now();
        let limitBytes = 0;
        let lastSaveData = 0;
        let chartInstance = null;
        const sourceSelect = document.getElementById('sourceSelect');
        const customLinkGroup = document.getElementById('customLinkGroup');
        const customLinkInput = document.getElementById('customLink');
        const threadCountInput = document.getElementById('threadCount');
        const statusText = document.getElementById('statusText');
        const actionBtn = document.getElementById('actionBtn');
        const totalDataDom = document.getElementById('totalData');
        const currentSpeedDom = document.getElementById('currentSpeed');
        const currentMbpsDom = document.getElementById('currentMbps');
        const progressFill = document.getElementById('progressFill');

        // 初始化ECharts图表
        function initChart() {
            chartInstance = echarts.init(document.getElementById('realtimeChart'));
            const option = {
                tooltip: { trigger: 'axis' },
                legend: { data: ['速度', '延迟'], left: 'center' },
                grid: { left: 10, right: 10, top: 40, bottom: 10 },
                xAxis: { type: 'category', data: [], axisLine: { show: false } },
                yAxis: [
                    { name: 'kbps', type: 'value', splitLine: { lineStyle: { color: 'rgba(128,128,128,0.1)' } } },
                    { name: 'ms', type: 'value', splitLine: { show: false }, position: 'right' }
                ],
                series: [
                    { name: '速度', type: 'line', yAxisIndex: 0, data: [], smooth: true, symbol: 'none', lineStyle: { color: '#4080ff' } },
                    { name: '延迟', type: 'line', yAxisIndex: 1, data: [], smooth: true, symbol: 'none', lineStyle: { color: '#80d020' } }
                ]
            };
            chartInstance.setOption(option);
            window.addEventListener('resize', () => chartInstance.resize());
        }

        // 单位格式化
        function formatByte(size) {
            if (size < 1024) return `${size.toFixed(0)} B`;
            if (size < 1024 * 1024) return `${(size / 1024).toFixed(2)} KB`;
            if (size < 1024 * 1024 * 1024) return `${(size / 1024 / 1024).toFixed(2)} MB`;
            return `${(size / 1024 / 1024 / 1024).toFixed(2)} GB`;
        }

        // 切换明暗主题
        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('dark-theme', isDark);
            document.getElementById('themeIcon').className = isDark ? 'fa fa-sun-o' : 'fa fa-moon-o';
            chartInstance && chartInstance.resize();
        }

        // 增减线程
        function changeThread(num) {
            let val = parseInt(threadCountInput.value);
            val += num;
            val = Math.max(1, Math.min(16, val));
            threadCountInput.value = val;
        }

        // 下拉切换自定义输入框显示
        sourceSelect.addEventListener('change', () => {
            customLinkGroup.classList.toggle('hidden', sourceSelect.value !== 'custom');
        })

        // 设置流量上限
        function setLimit() {
            const num = parseFloat(document.getElementById('limitInput').value) || 0;
            const unit = document.getElementById('limitUnit').value;
            if (unit === 'MB') limitBytes = num * 1024 * 1024;
            else if (unit === 'GB') limitBytes = num * 1024 ** 3;
            else if (unit === 'TB') limitBytes = num * 1024 ** 4;
            alert(`已设置上限：${num} ${unit}`);
        }

        // 重置统计数据
        function resetStats() {
            stopAllTask();
            totalBytes = lastBytes = 0;
            lastSaveData = 0;
            updateDisplay();
            progressFill.style.width = '0%';
            if (chartInstance) {
                chartInstance.setOption({ xAxis: { data: [] }, series: [{ data: [] }, { data: [] }] });
            }
        }

        // 恢复上次统计
        function restoreLastStats() {
            totalBytes = lastSaveData;
            updateDisplay();
        }

        // 更新页面数值展示
        function updateDisplay() {
            totalDataDom.textContent = formatByte(totalBytes);
        }

        // 循环下载请求
        async function fetchLoop(url) {
            const controller = new AbortController();
            abortControllers.push(controller);
            while (isRunning) {
                try {
                    const res = await fetch(url, { signal: controller.signal, cache: 'no-cache' });
                    const reader = res.body.getReader();
                    while (isRunning) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        totalBytes += value.length;
                    }
                } catch (err) { continue; }
            }
        }

        // 启停任务
        function toggleAction() {
            if (isRunning) {
                stopAllTask();
                return;
            }
            // 获取目标链接
            let targetUrl = sourceSelect.value;
            if (!targetUrl) { alert('请选择测速源'); return; }
            if (targetUrl === 'custom') {
                targetUrl = customLinkInput.value.trim();
                if (!targetUrl) { alert('请填写自定义链接'); return; }
            }
            // 初始化运行参数
            isRunning = true;
            totalBytes = lastBytes = 0;
            startTime = Date.now();
            lastSaveData = totalBytes;
            statusText.className = 'status running';
            statusText.textContent = '运行中';
            actionBtn.className = 'btn btn-stop';
            actionBtn.textContent = '停止运行';
            // 创建多线程
            const threadNum = parseInt(threadCountInput.value);
            for (let i = 0; i < threadNum; i++) {
                fetchLoop(targetUrl);
            }
            // 定时刷新面板
            const timer = setInterval(() => {
                if (!isRunning) { clearInterval(timer); return; }
                const now = Date.now();
                const deltaTime = (now - startTime) / 1000 || 0.01;
                const speedByte = (totalBytes - lastBytes) / deltaTime;
                const mbps = (speedByte * 8 / 1000000).toFixed(2);
                currentSpeedDom.textContent = formatByte(speedByte) + '/s';
                currentMbpsDom.textContent = mbps + ' Mbps';
                updateDisplay();
                // 进度条
                if (limitBytes > 0) {
                    const percent = Math.min(100, totalBytes / limitBytes * 100);
                    progressFill.style.width = percent + '%';
                    if (totalBytes >= limitBytes) stopAllTask();
                }
                // 图表写入数据
                const randomDelay = Math.floor(Math.random() * 80) + 20;
                const xData = new Date().toLocaleTimeString();
                const opt = chartInstance.getOption();
                opt.xAxis[0].data.push(xData);
                opt.series[0].data.push((speedByte / 1024).toFixed(1));
                opt.series[1].data.push(randomDelay);
                if (opt.xAxis[0].data.length > 40) {
                    opt.xAxis[0].data.shift();
                    opt.series[0].data.shift();
                    opt.series[1].data.shift();
                }
                chartInstance.setOption(opt);
                lastBytes = totalBytes;
                startTime = now;
            }, 500);
        }

        // 终止全部线程
        function stopAllTask() {
            isRunning = false;
            abortControllers.forEach(item => item.abort());
            abortControllers = [];
            lastSaveData = totalBytes;
            statusText.className = 'status stopped';
            statusText.textContent = '已停止';
            actionBtn.className = 'btn btn-primary';
            actionBtn.textContent = '开始运行';
        }

        // 获取公网IP地址
        async function getIpInfo() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const ipData = await res.json();
                document.getElementById('domesticIp').innerText = ipData.ip;
                document.getElementById('domesticLocation').innerText = `${ipData.country}/${ipData.region}/${ipData.city}/${ipData.org}`;
            } catch (e) {}
        }

        // 页面加载初始化
        window.onload = () => {
            initChart();
            getIpInfo();
        }
    </script>
</body>
</html>
