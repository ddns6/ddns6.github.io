    <style>
        :root {
            --bg-color: #f7f8fa;
            --card-bg: #ffffff;
            --text-main: #111;
            --text-gray: #666;
            --border-color: #e8e8ed;
            --primary-blue: #2574f7;
            --success-green: #09b85c;
            --danger-red: #ff4542;
            --progress-bg: #eee;
            --item-h: 46px;
            --radius: 10px;
        }
        .dark-theme {
            --bg-color: #121217;
            --card-bg: #1e1e26;
            --text-main: #f0f0f0;
            --text-gray: #a0a0a8;
            --border-color: #333340;
            --progress-bg: #2c2c38;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 8px;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        .header-wrap {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 16px;
        }
        .header-buttons {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 14px;
            border: 1px solid var(--border-color);
        }
        .flex-row-fixed {
            display: flex;
            flex-direction: row !important;
            gap: 8px;
            width: 100%;
            align-items: center;
        }
        .source-col {
            flex: 0.7;
            min-width: 70px;
            position: relative;
        }
        .thread-col {
            flex: 0.7;
            min-width: 80px;
            position: relative;
        }
        .btn-wrap {
            flex: 0 0 110px;
        }
        .form-group {
            margin-bottom: 0;
        }
        .form-input, select {
            width: 100%;
            height: var(--item-h);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-main);
            padding: 0 10px;
            font-size: 15px;
        }
        optgroup {
            font-size: 16px;
            padding: 6px 4px;
        }
        option {
            padding: 8px 4px;
        }
        .hidden {
            display: none !important;
        }
        .btn {
            width: 100%;
            height: var(--item-h);
            border-radius: var(--radius);
            border: none;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-primary {
            background: var(--primary-blue);
            color: #fff;
        }
        .btn-running {
            background: var(--success-green);
            color: #fff;
        }
        /* 悬浮文字层，盖住下拉框 */
        .overlay-txt{
            position:absolute;
            left:0;top:0;
            width:100%;height:100%;
            display:flex;
            align-items:center;
            padding:0 12px;
            background:var(--card-bg);
            border-radius:var(--radius);
            font-size:15px;
            z-index:2;
            pointer-events:none;
        }
        .hide-overlay{
            display:none;
        }
    </style>
</head>

    <script>
        let isDark = false;
        let isRunning = false;
        let abortControllers = [];
        let totalBytes = 0;
        let lastBytes = 0;
        let startTime = Date.now();
        const sourceSelect = document.getElementById('sourceSelect');
        const customLinkGroup = document.getElementById('customLinkGroup');
        const customLinkInput = document.getElementById('customLink');
        const threadCountInput = document.getElementById('threadCount');
        const actionBtn = document.getElementById('actionBtn');
        //悬浮文字元素
        const sourceOverlay = document.getElementById('sourceOverlay');
        const threadOverlay = document.getElementById('threadOverlay');
        const btnDefaultTxt = "开测";

        sourceSelect.addEventListener('change', () => {
            customLinkGroup.classList.toggle('hidden', sourceSelect.value !== 'custom');
        })

        function formatByte(size) {
            if (size < 1024) return `${size.toFixed(0)} B`;
            if (size < 1024 * 1024) return `${(size / 1024).toFixed(2)} KB`;
            if (size < 1024 * 1024 * 1024) return `${(size / 1024 / 1024).toFixed(2)}MB`;
            return `${(size / 1024 / 1024 / 1024).toFixed(2)} GB`;
        }
        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('dark-theme', isDark);
            document.getElementById('themeIcon').className = isDark ? 'fa fa-sun-o' : 'fa fa-moon-o';
        }
        function resetStats() {
            stopAllTask();
            totalBytes = lastBytes = 0;
        }
        async function fetchLoop(url) {
            const controller = new AbortController();
            abortControllers.push(controller);
            while (isRunning) {
                try {
                    const res = await fetch(url, { signal: controller.signal, cache: 'no-cache' });
                    const reader = res.body.getReader();
                    while (isRunning) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        totalBytes += value.length;
                    }
                } catch (err) { continue; }
            }
        }
        function toggleAction() {
            if (isRunning) {
                stopAllTask();
                return;
            }
            let targetUrl = sourceSelect.value;
            if(targetUrl === 'custom'){
                targetUrl = customLinkInput.value.trim();
                if(!targetUrl){
                    alert('请填写自定义链接');
                    return;
                }
            }
            if (!targetUrl) { alert('选择源'); return; }
            let threadNum = Number(threadCountInput.value);
            if(isNaN(threadNum) || threadNum <1){
                alert("选择线程");
                return;
            }
            isRunning = true;
            totalBytes = lastBytes = 0;
            startTime = Date.now();
            actionBtn.className = 'btn btn-running';
            //开启悬浮文字
            sourceOverlay.classList.remove('hide-overlay');
            threadOverlay.classList.remove('hide-overlay');
            for (let i = 0; i < threadNum; i++) fetchLoop(targetUrl);
            const timer = setInterval(() => {
                if (!isRunning) { clearInterval(timer); return; }
                const now = Date.now();
                const delta = (now - startTime)/1000 || 0.01;
                const spdB = (totalBytes - lastBytes)/delta;
                const mbps = (spdB *8 /1000000).toFixed(2);
                //已耗.速度修改悬浮层文字，不碰select下拉
                sourceOverlay.textContent = ""+formatByte(totalBytes);
                threadOverlay.textContent = ""+formatByte(spdB)+"/s";
                actionBtn.textContent = mbps + "Mbps";
                lastBytes = totalBytes;
                startTime = now;
            },500);
        }
        function stopAllTask() {
            isRunning = false;
            abortControllers.forEach(c=>c.abort());
            abortControllers = [];
            actionBtn.className = 'btn btn-primary';
            actionBtn.textContent = btnDefaultTxt;
            //隐藏悬浮文字，还原下拉原生显示
            sourceOverlay.classList.add('hide-overlay');
            threadOverlay.classList.add('hide-overlay');
        }
    </script>
