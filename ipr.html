<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>厂密速查&设备跳转</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 8px;
            min-height: 100vh;
        }
        .container {
            background: #fff;
            padding: 14px;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            width: 100%;
        }
        .select-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #deviceSelect {
            flex: 1;
            height: 42px;
            padding: 0 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
        }
        #deviceSelect:focus {
            border-color: #409eff;
        }
        .jump-btn {
            height: 42px;
            padding: 0 20px;
            background-color: #409eff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            white-space: nowrap;
        }
        .jump-btn:hover {
            background-color: #337ecc;
        }
        .tip-text {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
            min-height: 24px;
            padding-left: 4px;
            margin-top: 8px;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="select-row">
            <select id="deviceSelect">
                <option value="">请选择设备</option>
            </select>
            <button class="jump-btn" id="jumpBtn">跳</button>
        </div>
        <div class="tip-text" id="tipBox"></div>
    </div>

    <script>
        const deviceConfig = {
            运营商: {
                tip: "CMCCAdmin aDm8H%MdA \n admin Cmcc10086# \n CUAdmin CUAdmin \n telecomadmin nE7jA%5m admintelecom \n fiberhomehg2x0 hg2x0",
                url: "http://192.168.1.1/"
            },
            电信hs8145x6: {
                tip: "这是一个hs华为设备",
                url: "http://192.168.1.1/a"
            },
            电信hn8545: {
                tip: "这是一个万兆设备",
                url: "http://192.168.1.1/"
            },
            电信HG5140A: {
                tip: "HG5140A/HG6540A通用 \n telnet* \n telnetadmin \n FH-nE7jA%5m纯MAC后6 \n load_cli factory \n show admin_name \n show admin_pwd",
                url: "http://192.168.1.1:8080/cgi-bin/telnetenable.cgi?telnetenable=1&key=纯MAC"
            }
        };

        const deviceSel = document.getElementById('deviceSelect');
        const tipBox = document.getElementById('tipBox');
        const jumpBtn = document.getElementById('jumpBtn');

        function initSelectOptions() {
            // 遍历对象所有键
            Object.keys(deviceConfig).forEach(key => {
                const opt = document.createElement('option');
                opt.value = key;
                opt.innerText = key;
                deviceSel.appendChild(opt);
            });
        }

        function showDeviceTip() {
            const val = deviceSel.value;
            tipBox.innerText = val ? deviceConfig[val].tip : "";
        }

        // 跳转按钮
        jumpBtn.addEventListener('click', function () {
            const val = deviceSel.value;
            if (val) {
                window.open(deviceConfig[val].url, '_blank');
            } else {
                alert("请先选择设备");
            }
        });

        initSelectOptions();
        deviceSel.addEventListener('change', showDeviceTip);
    </script>
</body>
</html>
